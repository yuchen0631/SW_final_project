name: fretwise
description: "Fretwise — Guitar Learning App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0
  provider: ^6.1.2
  audioplayers: ^6.1.0
  pitch_detector_dart: ^0.0.7
  mic_stream: ^0.7.2
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  cloud_functions: ^6.3.1
  firebase_storage: ^13.4.2
  path_provider: ^2.0.15
  record: ^5.0.0
  device_calendar: ^3.9.0
  timezone: ^0.11.0
  youtube_player_flutter: ^10.0.1
  youtube_player_iframe: ^6.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
